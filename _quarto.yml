project:
  type: book
  output-dir: _site

book:
  title: "Scientific Computing"
  author: "Aditya Dendukuri"
  repo-url: https://github.com/AdityaDendukuri/cs111-scientific-computing-notes
  repo-actions: [edit, issue]
  chapters:
    - index.qmd

    - part: "Fundamentals"
      chapters:
        - fundamentals/math-notation.qmd
        - fundamentals/vectors-matrices.qmd
        - fundamentals/arithmetic.qmd
        - fundamentals/norms.qmd
        - fundamentals/complexity.qmd
        - fundamentals/floating-point.qmd
        - fundamentals/numpy-primer.qmd

    - part: "Direct Methods for Linear Systems"
      chapters:
        - direct-methods/linear-systems.qmd
        - direct-methods/lu.qmd
        - direct-methods/spd.qmd

    - part: "Orthogonality and Least Squares"
      chapters:
        - orthogonality/orthogonal.qmd
        - orthogonality/norms.qmd
        - orthogonality/stability.qmd
        - orthogonality/least-squares.qmd
        - orthogonality/chebyshev.qmd

    - part: "Eigenvalues and the SVD"
      chapters:
        - eigenvalues/eigenvalues.qmd
        - eigenvalues/svd.qmd
        - eigenvalues/lanczos.qmd
        - eigenvalues/jacobi-eig.qmd

    - part: "Iterative Methods for Linear Systems"
      chapters:
        - iterative/iterative.qmd
        - iterative/jacobi.qmd
        - iterative/conjugate-gradient.qmd
        - iterative/gmres.qmd

    - part: "Numerical Analysis"
      chapters:
        - numerical-analysis/quadrature.qmd
        - numerical-analysis/root-finding.qmd

    - part: "ODEs"
      chapters:
        - odes/ode-methods.qmd

    - part: "Applications"
      chapters:
        - applications/pca.qmd
        - applications/graphs.qmd
        - applications/operators.qmd
        - applications/fourier.qmd
        - applications/markov.qmd
        - applications/koopman.qmd

format:
  html:
    theme:
      light: flatly
      dark: darkly
    highlight-style: github
    code-copy: true
    toc: true
    toc-depth: 3
    number-sections: true
    include-after-body:
      text: |
        <a href="https://github.com/AdityaDendukuri/cs111-scientific-computing-notes/raw/main/main.pdf"
           title="Download PDF"
           style="position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;
                  background:rgba(255,255,255,0.85);border:1px solid #ccc;
                  border-radius:50%;width:2.4rem;height:2.4rem;
                  display:flex;align-items:center;justify-content:center;
                  box-shadow:0 2px 6px rgba(0,0,0,.15);
                  text-decoration:none;color:#555;font-size:1rem;
                  backdrop-filter:blur(4px);">
          <i class="bi bi-file-earmark-pdf"></i>
        </a>
    include-in-header:
      text: |
        <script>
        window.MathJax = {
          tex: {
            macros: {
              fR: ["\\mathbb{R}"],
              fC: ["\\mathbb{C}"],
              fZ: ["\\mathbb{Z}"],
              bx: ["\\boldsymbol{x}"],
              by: ["\\boldsymbol{y}"],
              bz: ["\\boldsymbol{z}"],
              bv: ["\\boldsymbol{v}"],
              bw: ["\\boldsymbol{w}"],
              bu: ["\\boldsymbol{u}"],
              ba: ["\\boldsymbol{a}"],
              bb: ["\\boldsymbol{b}"],
              bc: ["\\boldsymbol{c}"],
              bd: ["\\boldsymbol{d}"],
              be: ["\\boldsymbol{e}"],
              bg: ["\\boldsymbol{g}"],
              bp: ["\\boldsymbol{p}"],
              bq: ["\\boldsymbol{q}"],
              br: ["\\boldsymbol{r}"],
              bs: ["\\boldsymbol{s}"],
              bA: ["\\mathbf{A}"],
              bB: ["\\mathbf{B}"],
              bC: ["\\mathbf{C}"],
              bD: ["\\mathbf{D}"],
              bE: ["\\mathbf{E}"],
              bF: ["\\mathbf{F}"],
              bG: ["\\mathbf{G}"],
              bH: ["\\mathbf{H}"],
              bI: ["\\mathbf{I}"],
              bJ: ["\\mathbf{J}"],
              bK: ["\\mathbf{K}"],
              bL: ["\\mathbf{L}"],
              bM: ["\\mathbf{M}"],
              bP: ["\\mathbf{P}"],
              bQ: ["\\mathbf{Q}"],
              bR: ["\\mathbf{R}"],
              bS: ["\\mathbf{S}"],
              bT: ["\\mathbf{T}"],
              bU: ["\\mathbf{U}"],
              bV: ["\\mathbf{V}"],
              bX: ["\\mathbf{X}"],
              bY: ["\\mathbf{Y}"],
              bZ: ["\\mathbf{Z}"],
              bsigma: ["\\mathbf{\\Sigma}"],
              bzero: ["\\mathbf{0}"],
              argmin: ["\\operatorname{arg\\,min}"],
              argmax: ["\\operatorname{arg\\,max}"],
              printmatsq: ["\\begin{pmatrix} #1_{11} & \\cdots & #1_{1n} \\\\ \\vdots & \\ddots & \\vdots \\\\ #1_{n1} & \\cdots & #1_{nn} \\end{pmatrix}", 1],
              printmat:   ["\\begin{pmatrix} #1_{11} & \\cdots & #1_{1n} \\\\ \\vdots & \\ddots & \\vdots \\\\ #1_{m1} & \\cdots & #1_{mn} \\end{pmatrix}", 1],
              printrowvec: ["\\begin{pmatrix} #1_1 & \\cdots & #1_n \\end{pmatrix}", 1],
              printcolvec: ["\\begin{pmatrix} #1_1 \\\\ \\vdots \\\\ #1_n \\end{pmatrix}", 1],
              printmatrow: ["\\begin{pmatrix} \\cdots & \\boldsymbol{#1}_1 & \\cdots \\\\ & \\vdots & \\\\ \\cdots & \\boldsymbol{#1}_n & \\cdots \\end{pmatrix}", 1],
              printmatcol: ["\\begin{pmatrix} \\vdots & & \\vdots \\\\ \\boldsymbol{#1}_1 & \\cdots & \\boldsymbol{#1}_n \\\\ \\vdots & & \\vdots \\end{pmatrix}", 1]
            }
          }
        };
        </script>

  # PDF is produced by the existing latexmk pipeline (main.tex).
  # Quarto only renders HTML for the web book.
